services:
  flashcardquiz:
    image: ghcr.io/luke-butcher/flashcardquiz:latest
    container_name: flashcardquiz
    restart: unless-stopped
    ports:
      - "8085:8080"
    volumes:
      - ./data:/app/data
    user: "1026:100"
    environment:
      - PUID=1026
      - PGID=100
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/flashcards.db
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
